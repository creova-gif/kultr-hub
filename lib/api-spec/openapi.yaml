          description: "e.g. misleading_listing, suspected_scam, inappropriate_content, duplicate_event, other"
        details:
          type: string

    EventReportStatus:
      type: string
      enum: [open, reviewed, dismissed]

    EventReportView:
      type: object
      required: [id, eventId, reason, status, createdAt]
      properties:
        id:
          type: string
        eventId:
          type: string
        reason:
          type: string
        details:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EventReportStatus"
        createdAt:
          type: string
          format: date-time

    AdminEventReportView:
      allOf:
        - $ref: "#/components/schemas/EventReportView"
        - type: object
          required: [reporterId, resolvedAt]
          properties:
            reporterId:
              type: string
            resolvedAt:
              type: string
              format: date-time
              nullable: true

    EventReportListResponse:
      type: object
      required: [reports]
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/AdminEventReportView"

    ResolveEventReportRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [reviewed, dismissed]

    EventReportResolution:
      type: object
      required: [id, status, resolvedAt]
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/EventReportStatus"
        resolvedAt:
          type: string
          format: date-time
          nullable: true

    # ── USERS (public / admin) ─────────────────────────────────────────────────
    PublicUserProfile:
      type: object
      required: [id, displayName, isVerifiedOrganizer]
      properties:
        id:
          type: string
        displayName:
          type: string
        isVerifiedOrganizer:
          type: boolean

    VerifyOrganizerRequest:
      type: object
      required: [isVerifiedOrganizer]
      properties:
        isVerifiedOrganizer:
          type: boolean

    VerifyOrganizerResponse:
      type: object
      required: [id, isVerifiedOrganizer]
      properties:
        id:
          type: string
        isVerifiedOrganizer:
          type: boolean

    # ── NOTIFICATIONS ───────────────────────────────────────────────────────────
    NotificationType:
      type: string
      enum:
        - ticket_confirmed
        - event_approved
        - event_rejected
        - event_cancelled
        - payout_resolved
        - kultroin_earned

    NotificationView:
      type: object
      required: [id, type, title, body, read, createdAt]
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NotificationType"
        title:
          type: string
        body:
          type: string
        data:
          type: object
          additionalProperties: true
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      required: [notifications, unreadCount]
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationView"
        unreadCount:
          type: integer

    NotificationReadStatus:
      type: object
      required: [id, read]
      properties:
        id:
          type: string
        read:
          type: boolean

    # ── PAYOUTS ──────────────────────────────────────────────────────────────
    PayoutCurrencyBalance:
      type: object
      required: [currency, revenue, requested, available]
      properties:
        currency:
          type: string
        revenue:
          type: number
        requested:
          type: number
        available:
          type: number

    PayoutBalanceResponse:
      type: object
      required: [balances]
      properties:
        balances:
          type: array
          items:
            $ref: "#/components/schemas/PayoutCurrencyBalance"

    PayoutStatus:
      type: string
      enum: [pending, paid, failed, cancelled]

    PayoutView:
      type: object
      required: [id, amount, currency, status, destination, requestedAt, resolvedAt]
      properties:
        id:
          type: string
        creatorId:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          $ref: "#/components/schemas/PayoutStatus"
        destination:
          type: string
        resolutionNote:
          type: string
          nullable: true
        requestedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true

    PayoutListResponse:
      type: object
      required: [payouts]
      properties:
        payouts:
          type: array
          items:
            $ref: "#/components/schemas/PayoutView"

    CreatePayoutRequest:
      type: object
      required: [amount, currency, destination]
      properties:
        amount:
          type: number
        currency:
          type: string
        destination:
          type: string
          description: Phone number or bank reference to send the payout to — not validated or stored as structured payment credentials.

    ResolvePayoutRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [paid, failed, cancelled]
        resolutionNote:
          type: string
