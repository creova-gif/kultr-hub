openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Kultr Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: events
    description: Event discovery and management
  - name: tickets
    description: Ticket purchase and retrieval
  - name: fx
    description: Foreign-exchange rates
  - name: gamification
    description: Quests, KULTROIN rewards, perks and collectibles
  - name: users
    description: Account data rights — export and deletion

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/signup:
    post:
      operationId: authSignup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/otp/request:
    post:
      operationId: authOtpRequest
      tags: [auth]
      summary: Request a one-time passcode by SMS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestResponse"
        "400":
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/otp/verify:
    post:
      operationId: authOtpVerify
      tags: [auth]
      summary: Verify a one-time passcode and sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── USERS (data rights) ───────────────────────────────────────────────────
  /users/me/export:
    get:
      operationId: exportMyData
      tags: [users]
      summary: Export all data held about the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Machine-readable copy of the user's data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDataExport"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    delete:
      operationId: deleteMyAccount
      tags: [users]
      summary: Permanently delete the current user's account and data
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Account deleted
        "409":
          description: Account cannot be deleted yet (e.g. events with attendees)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/public:
    get:
      operationId: getPublicUser
      tags: [users]
      summary: Lightweight public profile lookup — trust signals (e.g. the Verified Organizer badge)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUserProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/verify:
    patch:
      operationId: setOrganizerVerified
      tags: [users]
      summary: Grant or revoke the Verified Organizer badge (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOrganizerRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOrganizerResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── EVENTS ────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events with optional filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: countryCode
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: dateFrom
          in: query
          description: Only include events on or after this ISO date/date-time.
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: Only include events on or before this ISO date/date-time.
          schema:
            type: string
            format: date
        - name: priceMin
          in: query
          description: >-
            Only include events with at least one ticket type priced at or
            above this amount.
          schema:
            type: number
        - name: priceMax
          in: query
          description: >-
            Only include events with at least one ticket type priced at or
            below this amount.
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"

  /events/search:
    get:
      operationId: searchEvents
      tags: [events]
      summary: Search live events by free-text query, with optional filters
      parameters:
        - name: q
          in: query
          schema:
            type: string
            default: ""
        - name: dateFrom
          in: query
          description: Only include events on or after this ISO date/date-time.
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: Only include events on or before this ISO date/date-time.
          schema:
            type: string
            format: date
        - name: priceMin
          in: query
          description: >-
            Only include events with at least one ticket type priced at or
            above this amount.
          schema:
            type: number
        - name: priceMax
          in: query
          description: >-
            Only include events with at least one ticket type priced at or
            below this amount.
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Matching events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

  /events/creator/me:
    get:
      operationId: listMyEvents
      tags: [events]
      summary: List events created by the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Creator events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

  /events/creator/analytics:
    get:
      operationId: getCreatorAnalytics
      tags: [events]
      summary: Get sales analytics for the creator's events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Creator analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorAnalytics"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/status:
    patch:
      operationId: updateEventStatus
      tags: [events]
      summary: >-
        Move an event through its lifecycle. A creator may submit their own
        draft for review (draft→pending_review), withdraw it
        (pending_review→draft), or cancel/end their own live event — they
        can never set an event live directly. Only an admin can approve a
        submission (pending_review→live), or force any transition on any
        event at any time (the moderation kill-switch).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStatusResponse"
        "403":
          description: Not the event's creator and not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: This transition is not allowed for a non-admin caller from the event's current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/admin/all:
    get:
      operationId: listAllEventsAdmin
      tags: [events]
      summary: List every event, optionally filtered by status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: status
          in: query
          description: Filter to a single status, e.g. pending_review to see the review queue
          schema:
            type: string
            enum: [draft, pending_review, live, cancelled, ended]
      responses:
        "200":
          description: All events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/report:
    post:
      operationId: reportEvent
      tags: [events]
      summary: File a fraud/abuse report on an event — any authenticated user
      description: >-
        Purely additive — filing a report never changes the event's own
        status. Lands in the admin work queue at GET /events/admin/reports.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventReportRequest"
      responses:
        "201":
          description: Report filed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventReportView"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/admin/reports:
    get:
      operationId: listEventReportsAdmin
      tags: [events]
      summary: List every event report, newest first (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Event reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventReportListResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/admin/reports/{id}:
    patch:
      operationId: resolveEventReport
      tags: [events]
      summary: Mark a report reviewed or dismissed (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveEventReportRequest"
      responses:
        "200":
          description: Report resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventReportResolution"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── TICKETS ───────────────────────────────────────────────────────────────
  /tickets:
    get:
      operationId: listMyTickets
      tags: [tickets]
      summary: List tickets purchased by the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"

    post:
      operationId: purchaseTicket
      tags: [tickets]
      summary: Purchase a ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseTicketRequest"
      responses:
        "201":
          description: Ticket purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "400":
          description: Not enough tickets available or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get a single ticket by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── FX ────────────────────────────────────────────────────────────────────
  /fx/rates:
    get:
      operationId: getFxRates
      tags: [fx]
      summary: Get exchange rates rebased to a currency
      parameters:
        - name: base
          in: query
          required: false
          schema:
            type: string
            default: KES
      responses:
        "200":
          description: Exchange rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxRates"

  # ── GAMIFICATION ──────────────────────────────────────────────────────────
  /quests/progress:
    get:
      operationId: getQuestProgress
      tags: [gamification]
      summary: Get the signed-in user's quest progress, balance and collectibles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Quest progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestProgress"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getGamificationProfile
      tags: [gamification]
      summary: Level, XP, streaks and badge summary for the signed-in user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gamification profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamificationProfile"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /check-in/verify:
    post:
      operationId: verifyCheckin
      tags: [gamification]
      summary: Verify event attendance and advance quests
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinRequest"
      responses:
        "200":
          description: Already checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResult"
        "201":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResult"
        "403":
          description: No confirmed ticket for this event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /perks:
    get:
      operationId: listPerks
      tags: [gamification]
      summary: List redeemable perks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perks catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerkListResponse"

  /perks/unlock:
    post:
      operationId: unlockPerk
      tags: [gamification]
      summary: Spend KULTROINS to unlock a perk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockPerkRequest"
      responses:
        "201":
          description: Perk unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockPerkResponse"
        "402":
          description: Insufficient KULTROINS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Perk already unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/ledger:
    get:
      operationId: getWalletLedger
      tags: [gamification]
      summary: Get the signed-in user's KULTROIN ledger history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerResponse"

  /pass/activate:
    post:
      operationId: activatePass
      tags: [gamification]
      summary: Activate or refresh the KULTR PASS entitlement — requires a verified payment
      description: >-
        A one-time charge with manual renewal (not auto-recurring). The
        caller must supply the `reference` of a payment already initiated
        via POST /payments/pass/init and verified via POST
        /payments/pass/verify; that reference is consumed exactly once.
        Every activation sets a 30-day expiresAt.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassActivateRequest"
      responses:
        "201":
          description: Pass activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassActivateResponse"
        "400":
          description: reference is missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Payment has not been verified yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching payment found for this reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: This payment reference was already used to activate KULTR PASS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── NOTIFICATIONS ─────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List the signed-in user's notifications, newest first
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationReadStatus"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark every unread notification as read for the signed-in user
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Marked all read

  # ── PAYOUTS ──────────────────────────────────────────────────────────────
  # A request queue, not a payment rail — see lib/db/src/schema/payouts.ts.
  # No automated Paystack Transfers / M-Pesa B2C / MoMo Disbursements
  # integration exists yet; an admin resolves requests after moving money
  # through an out-of-band channel. The balance calculation is real.
  /payouts/balance:
    get:
      operationId: getPayoutBalance
      tags: [payouts]
      summary: Real available balance per currency (confirmed ticket revenue minus already-requested payouts)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Balances by currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBalanceResponse"

  /payouts:
    get:
      operationId: listMyPayouts
      tags: [payouts]
      summary: List the current user's own payout requests, newest first
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Payout requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutListResponse"
    post:
      operationId: requestPayout
      tags: [payouts]
      summary: Request a payout — amount is validated against the real available balance server-side
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayoutRequest"
      responses:
        "201":
          description: Payout requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutView"
        "400":
          description: Invalid amount, or amount exceeds available balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payouts/admin/pending:
    get:
      operationId: listPendingPayoutsAdmin
      tags: [payouts]
      summary: Every pending payout request across all creators (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending payouts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutListResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payouts/{id}:
    patch:
      operationId: resolvePayout
      tags: [payouts]
      summary: Record that a pending payout was paid, failed, or cancelled (admin only) — does not move money itself
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolvePayoutRequest"
      responses:
        "200":
          description: Payout resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutView"
        "409":
          description: This payout was already resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
      required:
        - message

    FxRates:
      type: object
      properties:
        base:
          type: string
        rates:
          type: object
          additionalProperties:
            type: number
        source:
          type: string
          enum: [live, static]
        fetchedAt:
          type: string
          format: date-time
      required:
        - base
        - rates
        - source
        - fetchedAt

    # ── AUTH ────────────────────────────────────────────────────────────────
    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
        countryCode:
          type: string
          default: KE
      required:
        - email
        - password
        - displayName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    OtpRequest:
      type: object
      properties:
        phone:
          type: string
        countryCode:
          type: string
      required:
        - phone

    OtpRequestResponse:
      type: object
      properties:
        simulated:
          type: boolean
        expiresInSeconds:
          type: integer
        devCode:
          type: string
          description: Only present in simulated mode (no SMS gateway configured).
      required:
        - simulated
        - expiresInSeconds

    OtpVerifyRequest:
      type: object
      properties:
        phone:
          type: string
        countryCode:
          type: string
        code:
          type: string
        displayName:
          type: string
      required:
        - phone
        - code

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        countryCode:
          type: string
        isCreator:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - displayName
        - countryCode
        - isCreator
        - createdAt

    UserDataExport:
      type: object
      description: Full machine-readable copy of the data held about a user.
      properties:
        exportedAt:
          type: string
          format: date-time
        profile:
          type: object
          additionalProperties: true
        tickets:
          type: array
          items:
            type: object
            additionalProperties: true
        eventsCreated:
          type: array
          items:
            type: object
            additionalProperties: true
        rewards:
          type: object
          additionalProperties: true
      required:
        - exportedAt
        - profile
        - tickets
        - eventsCreated
        - rewards

    # ── EVENTS ──────────────────────────────────────────────────────────────
    TicketTypeSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        currency:
          type: string
        available:
          type: integer
      required:
        - id
        - name
        - price
        - currency
        - available

    EventSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        category:
          type: string
        venue:
          type: string
        city:
          type: string
        country:
          type: string
        countryCode:
          type: string
        eventDate:
          type: string
          format: date-time
        imageUrl:
          type: string
          nullable: true
        imageKey:
          type: string
          nullable: true
        featured:
          type: boolean
        tags:
          type: array
          items:
            type: string
          nullable: true
        minPrice:
          type: number
        currency:
          type: string
        status:
          type: string
      required:
        - id
        - title
        - category
        - venue
        - city
        - country
        - countryCode
        - eventDate
        - featured
        - minPrice
        - currency
        - status

    EventDetail:
      allOf:
        - $ref: "#/components/schemas/EventSummary"
        - type: object
          properties:
            description:
              type: string
            capacity:
              type: integer
              nullable: true
            latitude:
              type: number
              nullable: true
            longitude:
              type: number
              nullable: true
            ticketTypes:
              type: array
              items:
                $ref: "#/components/schemas/TicketTypeSummary"
            creatorId:
              type: string
          required:
            - description
            - ticketTypes
            - creatorId

    EventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/EventSummary"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - events
        - total
        - limit
        - offset

    CreateEventRequest:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Music, Art, Food, Heritage, Comedy, Sports, Nightlife]
        venue:
          type: string
        city:
          type: string
        country:
          type: string
        countryCode:
          type: string
        eventDate:
          type: string
          format: date-time
        imageUrl:
          type: string
        capacity:
          type: integer
        tags:
          type: array
          items:
            type: string
        ticketTypes:
          type: array
          items:
            $ref: "#/components/schemas/CreateTicketTypeRequest"
      required:
        - title
        - description
        - category
        - venue
        - city
        - country
        - countryCode
        - eventDate
        - ticketTypes

    CreateTicketTypeRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        currency:
          type: string
        totalQuantity:
          type: integer
      required:
        - name
        - price
        - currency
        - totalQuantity

    # ── TICKETS ─────────────────────────────────────────────────────────────
    PurchaseTicketRequest:
      type: object
      properties:
        eventId:
          type: string
        ticketTypeId:
          type: string
        quantity:
          type: integer
          minimum: 1
          default: 1
      required:
        - eventId
        - ticketTypeId

    TicketDetail:
      type: object
      properties:
        id:
          type: string
        ticketNumber:
          type: string
        eventId:
          type: string
        ticketTypeId:
          type: string
        ticketTypeName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalAmount:
          type: number
        currency:
          type: string
        status:
          type: string
        purchasedAt:
          type: string
          format: date-time
        event:
          $ref: "#/components/schemas/EventSummary"
      required:
        - id
        - ticketNumber
        - eventId
        - ticketTypeId
        - ticketTypeName
        - quantity
        - unitPrice
        - totalAmount
        - currency
        - status
        - purchasedAt
        - event

    TicketListResponse:
      type: object
      properties:
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/TicketDetail"
        total:
          type: integer
      required:
        - tickets
        - total

    CreatedEventStats:
      type: object
      required: [id, title, category, eventDate, venue, city, status, ticketsSold, revenue, currency]
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        eventDate:
          type: string
          format: date-time
        venue:
          type: string
        city:
          type: string
        status:
          type: string
        ticketsSold:
          type: integer
        revenue:
          type: number
        currency:
          type: string

    CreatorAnalytics:
      type: object
      required: [events, totalRevenue, totalTicketsSold, liveEvents, weeklySales, salesByCity]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/CreatedEventStats"
        totalRevenue:
          type: number
        totalTicketsSold:
          type: integer
        liveEvents:
          type: integer
        weeklySales:
          type: array
          description: Real ticket sales for the last 8 weeks, bucketed by purchase date. Oldest first.
          items:
            $ref: "#/components/schemas/WeeklySalesPoint"
        salesByCity:
          type: array
          description: Real ticket sales grouped by event city, highest first.
          items:
            $ref: "#/components/schemas/CitySalesPoint"

    WeeklySalesPoint:
      type: object
      required: [weekStart, ticketsSold]
      properties:
        weekStart:
          type: string
          format: date-time
        ticketsSold:
          type: integer

    CitySalesPoint:
      type: object
      required: [city, ticketsSold]
      properties:
        city:
          type: string
        ticketsSold:
          type: integer

    UpdateEventStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [draft, pending_review, live, cancelled, ended]

    EventStatusResponse:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [draft, pending_review, live, cancelled, ended]

    # ── GAMIFICATION ──────────────────────────────────────────────────────────
    CollectibleRarity:
      type: string
      enum: [common, rare, epic, legendary]

    PassStatus:
      type: object
      required: [active, multiplier]
      properties:
        active:
          type: boolean
        multiplier:
          type: number

    OverallProgress:
      type: object
      required: [total, completed, percent, allCompleted]
      properties:
        total:
          type: integer
        completed:
          type: integer
        percent:
          type: integer
        allCompleted:
          type: boolean

    QuestView:
      type: object
      required:
        - id
        - slug
        - name
        - description
        - target
        - progress
        - completed
        - points
        - collectibleName
        - collectibleRarity
        - percent
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        target:
          type: integer
        progress:
          type: integer
        completed:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        points:
          type: integer
        collectibleName:
          type: string
        collectibleRarity:
          $ref: "#/components/schemas/CollectibleRarity"
        badgeImageKey:
          type: string
          nullable: true
        percent:
          type: integer

    CollectibleView:
      type: object
      required: [slug, name, rarity, earnedAt]
      properties:
        slug:
          type: string
        name:
          type: string
        rarity:
          $ref: "#/components/schemas/CollectibleRarity"
        imageKey:
          type: string
          nullable: true
        earnedAt:
          type: string
          format: date-time

    QuestProgress:
      type: object
      required: [balance, lifetimeEarned, pass, quests, overall, collectibles]
      properties:
        balance:
          type: integer
        lifetimeEarned:
          type: integer
        pass:
          $ref: "#/components/schemas/PassStatus"
        quests:
          type: array
          items:
            $ref: "#/components/schemas/QuestView"
        overall:
          $ref: "#/components/schemas/OverallProgress"
        collectibles:
          type: array
          items:
            $ref: "#/components/schemas/CollectibleView"

    CheckinRequest:
      type: object
      required: [eventId]
      properties:
        eventId:
          type: string
        ticketId:
          type: string

    QuestCompletion:
      type: object
      required: [slug, name, points]
      properties:
        slug:
          type: string
        name:
          type: string
        points:
          type: integer

    GrantedCollectible:
      type: object
      required: [slug, name, rarity]
      properties:
        slug:
          type: string
        name:
          type: string
        rarity:
          type: string

    CheckinResult:
      type: object
      required: [alreadyCheckedIn, pointsEarned, questsCompleted, collectiblesGranted]
      properties:
        alreadyCheckedIn:
          type: boolean
        pointsEarned:
          type: integer
        questsCompleted:
          type: array
          items:
            $ref: "#/components/schemas/QuestCompletion"
        collectiblesGranted:
          type: array
          items:
            $ref: "#/components/schemas/GrantedCollectible"
        allCompleted:
          type: boolean
        legendAwarded:
          type: boolean

    PerkView:
      type: object
      required: [id, slug, name, cost, repeatable, active]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        cost:
          type: integer
        repeatable:
          type: boolean
        active:
          type: boolean

    PerkListResponse:
      type: object
      required: [perks]
      properties:
        perks:
          type: array
          items:
            $ref: "#/components/schemas/PerkView"

    UnlockPerkRequest:
      type: object
      required: [perkSlug]
      properties:
        perkSlug:
          type: string

    UnlockPerkResponse:
      type: object
      required: [unlocked, perk, balanceAfter]
      properties:
        unlocked:
          type: boolean
        perk:
          type: object
          required: [slug, name]
          properties:
            slug:
              type: string
            name:
              type: string
        balanceAfter:
          type: integer

    LedgerEntry:
      type: object
      required: [id, seq, userId, delta, reason, balanceAfter, idempotencyKey, txHash, createdAt]
      properties:
        id:
          type: string
        seq:
          type: integer
        userId:
          type: string
        delta:
          type: integer
        reason:
          type: string
        balanceAfter:
          type: integer
        referenceType:
          type: string
          nullable: true
        referenceId:
          type: string
          nullable: true
        idempotencyKey:
          type: string
        prevHash:
          type: string
          nullable: true
        txHash:
          type: string
        createdAt:
          type: string
          format: date-time

    LedgerResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"

    GamificationProfile:
      type: object
      required: [level, xp, xpToNextLevel, lifetimeEarned, balance, totalCheckins, questsCompleted, currentStreak, bestStreak, last7Days, badges, collectibles]
      properties:
        level:
          type: integer
        xp:
          type: integer
        xpToNextLevel:
          type: integer
        lifetimeEarned:
          type: integer
        balance:
          type: integer
        totalCheckins:
          type: integer
        questsCompleted:
          type: integer
        currentStreak:
          type: integer
        bestStreak:
          type: integer
        last7Days:
          type: array
          items:
            $ref: "#/components/schemas/StreakDay"
        badges:
          type: array
          items:
            $ref: "#/components/schemas/BadgeView"
        collectibles:
          type: array
          items:
            $ref: "#/components/schemas/CollectibleView"

    StreakDay:
      type: object
      required: [date, checked]
      properties:
        date:
          type: string
        checked:
          type: boolean

    BadgeView:
      type: object
      required: [id, name, description, earned]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        earned:
          type: boolean

    PassActivateRequest:
      type: object
      required: [reference]
      properties:
        reference:
          type: string
          description: Reference of a payment already verified via POST /payments/pass/verify.

    PassActivateResponse:
      type: object
      required: [active, multiplier, tier]
      properties:
        active:
          type: boolean
        multiplier:
          type: number
        tier:
          type: string
        expiresAt:
